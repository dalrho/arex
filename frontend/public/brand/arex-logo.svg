      <stop offset="0.52" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="shield" x1="168" y1="138" x2="346" y2="362" gradientUnits="userSpaceOnUse">
