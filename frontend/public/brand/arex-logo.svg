<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AREX logo preview</title>
  <desc id="desc">A dark rounded-square mark with a blue shield and compliance signal accent.</desc>
  <defs>
