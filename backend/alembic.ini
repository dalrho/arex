# A generic, single-database configuration.

[alembic]
# path to migration scripts (relative to where alembic is executed from the backend directory)
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# version location specification; defaults to migrations/versions.
# version_locations = %(here)s/versions

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = postgresql://postgres:dev_password@localhost:5432/arex_db


[post_write_hooks]
# post_write_hooks defines scripts or methods that are run after a new migration script is generated.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
