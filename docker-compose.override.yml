version: "3.8"

services:
  # Expose Postgres port for easy connection from database management tools on the host
  postgres:
    ports:
      - "5432:5432"

  # Expose Qdrant API port to interact with vector database directly from local tools
  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  # Backend local dev overrides: hot reload mounting and debug flags
  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./infra:/infra
    environment:
      - DEV_MODE=true
      - LOG_LEVEL=debug
      # AI Mode — set to "online" to use live Gemini inference
      # Set to "offline" for mock-only mode (safe for demos without API access)
      - AI_MODE=${AI_MODE:-hackathon}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-2.5-flash}
      - GEMINI_EMBEDDING_MODEL=gemini-embedding-001
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/deepseek-v4-flash}
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend local dev overrides: port exposure and Next.js hot reload volumes
  frontend:
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
    command: sh -c "find .next -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true; npm run dev"
