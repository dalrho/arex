openapi: 3.1.0
info:
  title: AREX
  description: Regulatory compliance intelligence platform for FDA 21 CFR Part 11
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: User login to generate JWT authentication token.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      summary: Get Me
      description: Get current authenticated user info.
      operationId: get_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Me Api V1 Auth Me Get
      security:
      - OAuth2PasswordBearer: []
  /api/v1/organizations/me:
    get:
      tags:
      - Organizations
      summary: Get Current Org
      description: Retrieve current tenant organization workspace details.
      operationId: get_current_org_api_v1_organizations_me_get
      parameters:
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/:
    post:
      tags:
      - Documents
      summary: Upload Document
      description: 'Upload a quality system SOP document (PDF or TXT).

        Extracts text, generates semantic chunks, indexes vectors in Qdrant, and saves
        metadata in Postgres.'
      operationId: upload_document_api_v1_documents__post
      parameters:
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_document_api_v1_documents__post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Documents
      summary: List Documents
      description: List all uploaded QMS documents scoped by organization tenant.
      operationId: list_documents_api_v1_documents__get
      parameters:
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentResponse'
                title: Response List Documents Api V1 Documents  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/documents/{document_id}:
    get:
      tags:
      - Documents
      summary: Get Document
      description: Get details of a specific document.
      operationId: get_document_api_v1_documents__document_id__get
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Document Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Documents
      summary: Delete Document
      description: Delete a document from QMS and Qdrant index.
      operationId: delete_document_api_v1_documents__document_id__delete
      parameters:
      - name: document_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Document Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/regulations/:
    get:
      tags:
      - Regulations
      summary: List Regulations
      description: List all FDA regulations monitored by the platform.
      operationId: list_regulations_api_v1_regulations__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RegulationResponse'
                type: array
                title: Response List Regulations Api V1 Regulations  Get
  /api/v1/regulations/{regulation_id}:
    get:
      tags:
      - Regulations
      summary: Get Regulation
      description: Get a specific regulation update details.
      operationId: get_regulation_api_v1_regulations__regulation_id__get
      parameters:
      - name: regulation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Regulation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegulationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/regulations/ingest:
    post:
      tags:
      - Regulations
      summary: Ingest Regulation
      description: Manually ingest a new regulation text for analysis and impact mapping.
      operationId: ingest_regulation_api_v1_regulations_ingest_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegulationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/impact/:
    get:
      tags:
      - Impact Assessment
      summary: List Impact Assessments
      description: List all regulatory impact assessments generated for the organization.
      operationId: list_impact_assessments_api_v1_impact__get
      parameters:
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImpactResponse'
                title: Response List Impact Assessments Api V1 Impact  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/impact/regulation/{regulation_id}:
    get:
      tags:
      - Impact Assessment
      summary: Get Impact By Regulation
      description: Get the impact assessment of a specific regulation update on this
        organization's SOP portfolio.
      operationId: get_impact_by_regulation_api_v1_impact_regulation__regulation_id__get
      parameters:
      - name: regulation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Regulation Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/impact/regulation/{regulation_id}/assess:
    post:
      tags:
      - Impact Assessment
      summary: Trigger Impact Assessment
      description: Trigger the AI compliance impact engine to generate an assessment
        mapping a regulation update to SOPs.
      operationId: trigger_impact_assessment_api_v1_impact_regulation__regulation_id__assess_post
      parameters:
      - name: regulation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Regulation Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpactResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/remediation/:
    get:
      tags:
      - Remediation Drafts
      summary: List Remediation Drafts
      description: List all AI-generated remediation drafts scoped for the tenant.
      operationId: list_remediation_drafts_api_v1_remediation__get
      parameters:
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RemediationResponse'
                title: Response List Remediation Drafts Api V1 Remediation  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/remediation/{remediation_id}:
    get:
      tags:
      - Remediation Drafts
      summary: Get Remediation Draft
      description: Get details of a specific remediation draft.
      operationId: get_remediation_draft_api_v1_remediation__remediation_id__get
      parameters:
      - name: remediation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Remediation Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemediationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Remediation Drafts
      summary: Update Remediation Draft
      description: Allows human editors to modify the AI-proposed remediation draft
        before submission.
      operationId: update_remediation_draft_api_v1_remediation__remediation_id__put
      parameters:
      - name: remediation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Remediation Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediationUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemediationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/:
    get:
      tags:
      - Implementation Tasks
      summary: List Tasks
      description: List all compliance implementation tasks.
      operationId: list_tasks_api_v1_tasks__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TaskResponse'
                type: array
                title: Response List Tasks Api V1 Tasks  Get
    post:
      tags:
      - Implementation Tasks
      summary: Create Task
      description: Create a new implementation action item.
      operationId: create_task_api_v1_tasks__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{task_id}:
    put:
      tags:
      - Implementation Tasks
      summary: Update Task
      description: Update details or status (TODO/IN_PROGRESS/DONE) of a task.
      operationId: update_task_api_v1_tasks__task_id__put
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Task Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Implementation Tasks
      summary: Delete Task
      description: Delete a specific task.
      operationId: delete_task_api_v1_tasks__task_id__delete
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Task Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/approvals/remediation/{remediation_id}:
    post:
      tags:
      - Approvals
      summary: Submit Approval Decision
      description: 'Submit an approval decision (APPROVED or REJECTED) for an AI proposed
        remediation draft.

        Triggers automated version control upgrades, updates disk storage, and syncs
        vector index embeddings upon approval.

        Logs an immutable record in the audit log (21 CFR Part 11 compliance).'
      operationId: submit_approval_decision_api_v1_approvals_remediation__remediation_id__post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: remediation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Remediation Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRecordResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/approvals/records:
    get:
      tags:
      - Approvals
      summary: List Approval Records
      description: List all approval audit records (logs) for system audits.
      operationId: list_approval_records_api_v1_approvals_records_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApprovalRecordResponse'
                type: array
                title: Response List Approval Records Api V1 Approvals Records Get
  /api/v1/dashboard/:
    get:
      tags:
      - Dashboard
      summary: Get Dashboard Metrics
      description: Retrieve aggregated metrics and recent activity for the AREX
        OS dashboard view.
      operationId: get_dashboard_metrics_api_v1_dashboard__get
      parameters:
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/exports/remediation/{remediation_id}/pdf:
    get:
      tags:
      - Exports
      summary: Export Remediation Pdf
      description: Exports the additions and deletions of a remediation draft into
        a formatted PDF document.
      operationId: export_remediation_pdf_api_v1_exports_remediation__remediation_id__pdf_get
      parameters:
      - name: remediation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Remediation Id
      - name: X-Tenant-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /health:
    get:
      tags:
      - health
      summary: Health Check
      description: Simple health check endpoint to verify backend service viability.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    ApprovalDecisionRequest:
      properties:
        decision:
          type: string
          title: Decision
        final_content:
          anyOf:
          - {}
          - type: 'null'
          title: Final Content
      type: object
      required:
      - decision
      title: ApprovalDecisionRequest
    ApprovalRecordResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        item_type:
          type: string
          title: Item Type
        item_id:
          type: string
          format: uuid
          title: Item Id
        status:
          type: string
          title: Status
        reviewer_id:
          type: string
          format: uuid
          title: Reviewer Id
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        original_content:
          anyOf:
          - {}
          - type: 'null'
          title: Original Content
        final_content:
          anyOf:
          - {}
          - type: 'null'
          title: Final Content
      type: object
      required:
      - id
      - item_type
      - item_id
      - status
      - reviewer_id
      - timestamp
      title: ApprovalRecordResponse
    Body_upload_document_api_v1_documents__post:
      properties:
        file:
          type: string
          format: binary
          title: File
      type: object
      required:
      - file
      title: Body_upload_document_api_v1_documents__post
    DashboardMetrics:
      properties:
        total_documents:
          type: integer
          title: Total Documents
        total_regulations:
          type: integer
          title: Total Regulations
        pending_assessments:
          type: integer
          title: Pending Assessments
        pending_remediations:
          type: integer
          title: Pending Remediations
        open_tasks:
          type: integer
          title: Open Tasks
        max_risk_score:
          type: number
          title: Max Risk Score
        recent_activity:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Recent Activity
      type: object
      required:
      - total_documents
      - total_regulations
      - pending_assessments
      - pending_remediations
      - open_tasks
      - max_risk_score
      - recent_activity
      title: DashboardMetrics
    DocumentResponse:
      properties:
        filename:
          type: string
          title: Filename
        id:
          type: string
          format: uuid
          title: Id
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        file_path:
          type: string
          title: File Path
        version:
          type: integer
          title: Version
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - filename
      - id
      - organization_id
      - file_path
      - version
      - created_at
      title: DocumentResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ImpactResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        regulation_id:
          type: string
          format: uuid
          title: Regulation Id
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        risk_score:
          type: number
          title: Risk Score
        impact_level:
          type: string
          title: Impact Level
        rationale:
          type: string
          title: Rationale
        affected_departments:
          items:
            type: string
          type: array
          title: Affected Departments
        status:
          type: string
          title: Status
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - regulation_id
      - organization_id
      - risk_score
      - impact_level
      - rationale
      - affected_departments
      - status
      - created_at
      title: ImpactResponse
    IngestionRequest:
      properties:
        title:
          type: string
          title: Title
        source_url:
          type: string
          title: Source Url
        raw_content:
          type: string
          title: Raw Content
      type: object
      required:
      - title
      - source_url
      - raw_content
      title: IngestionRequest
    LoginRequest:
      properties:
        email:
          type: string
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: LoginRequest
    OrganizationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
      type: object
      required:
      - id
      - name
      title: OrganizationResponse
    RegulationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        source_url:
          type: string
          title: Source Url
        title:
          type: string
          title: Title
        published_date:
          type: string
          format: date-time
          title: Published Date
        raw_content:
          type: string
          title: Raw Content
        parsed_sections:
          anyOf:
          - {}
          - type: 'null'
          title: Parsed Sections
        hash_value:
          type: string
          title: Hash Value
        status:
          type: string
          title: Status
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - source_url
      - title
      - published_date
      - raw_content
      - hash_value
      - status
      - created_at
      title: RegulationResponse
    RemediationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        document_id:
          type: string
          format: uuid
          title: Document Id
        regulation_id:
          type: string
          format: uuid
          title: Regulation Id
        proposed_text:
          type: string
          title: Proposed Text
        original_text:
          type: string
          title: Original Text
        diff_content:
          anyOf:
          - {}
          - type: 'null'
          title: Diff Content
        status:
          type: string
          title: Status
